name: sightseeing_collector
description: Ein interaktives Sightseeing-Sammelspiel mit GPS und Quests im Stil von Pokémon Go.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI und State Management
  provider: ^6.0.0
  
  # Geolocation und Maps
  geolocator: ^9.0.2
  google_maps_flutter: ^2.5.0
  sensors_plus: ^3.0.0
  
  # Datenbanken und Speicherung
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  
  # JSON Serialisierung
  json_serializable: ^6.7.0
  
  # HTTP und API
  http: ^1.1.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  permission_handler: ^11.0.0
  url_launcher: ^6.3.2
  image_picker: ^1.0.0
  video_player: ^2.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  flutter_native_splash: ^2.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/config.json

flutter_native_splash:
  color: "#1a1a2e"
  image: assets/images/map_pin_splash_screen.png
  android: true
  ios: true
  android_12:
    color: "#1a1a2e"
    image: assets/images/map_pin_splash_screen.png
